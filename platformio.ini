[platformio]
src_dir = src

#TEST SKETCH 
[env:test]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
monitor_port = /dev/ttyUSB0
upload_port = /dev/ttyUSB0
build_src_filter = +<test.cpp>

