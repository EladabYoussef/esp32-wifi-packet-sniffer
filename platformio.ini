[platformio]
src_dir = src

#TEST SKETCH 
[env:test]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
monitor_port = /dev/ttyUSB1
upload_port = /dev/ttyUSB1
src_filter = +<test.cpp>

# DATA COLLECTION 
[env:datacol]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
monitor_port = /dev/ttyUSB1
upload_port = /dev/ttyUSB1
src_filter = +<data_collection.cpp>

# INFERENCE
[env:inference]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
monitor_port = /dev/ttyUSB1
upload_port = /dev/ttyUSB1
src_filter = +<inference.cpp>
